<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym Site | Negarin Webdesign</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f7fc;
      color: #1d2340;
    }

    .container {
      width: min(92%, 1100px);
      margin: 0 auto;
    }

    header {
      padding: 28px 0;
      background: #fff;
      border-bottom: 1px solid rgba(98, 82, 181, 0.12);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
.logo {
  display: inline-flex;
  align-items: center;
  flex-shrink: 0;
}

.logo img {
   width: 210px;
  height: auto;
  display: block;
  
}
@media (max-width: 520px) {
  .logo img {
    width: 170px;
   
  }
}


    .logo span {
      color: #6f5bff;
    }

    .back-btn {
      padding: 10px 18px;
      border-radius: 999px;
      background: #6f5bff;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    .intro {
      text-align: center;
      padding: 55px 0 35px;
    }

    .intro h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      margin: 0 0 12px;
    }

    .intro p {
      color: #697289;
      margin: 0;
      font-size: 1.05rem;
    }

    .gallery {
      display: grid;
      gap: 34px;
      padding-bottom: 70px;
    }

    .gallery img {
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(86, 67, 163, 0.13);
      border: 1px solid rgba(98, 82, 181, 0.12);
    }

    footer {
      text-align: center;
      padding: 28px;
      color: #697289;
      background: #fff;
      border-top: 1px solid rgba(98, 82, 181, 0.12);
    }
  </style>
</head>

<body>

  <header>
    <div class="container top">
      <a class="logo" href="home" aria-label="Negarin Webdesign Startseite">
      <img src="../../../assets/images/negarin-logo-transparent.png" alt="Negarin Webdesign Logo">
      </a>
      <a href="/en/" class="back-btn">Back to Home</a>
    </div>
  </header>

  <main>
    <section class="intro">
      <div class="container">
        <h1>Fitnessstudio Website</h1>
        <p>A modern website design concept for a local Fitnessstudio.</p>
        <p style="font-size: 0.8rem; color: #888; margin-top: 4px;">
         A conceptual design created for a local business – portfolio project.
        </p>
      </div>
    </section>

    <section class="container gallery">
      <img src="../../../assets/images/GYm/HeaderGymsite.jpg" alt="Gym Website Header">
       <img src="../../../assets/images/GYm/ClassesGymsite.jpg" alt="Gym Website Classes">
       <img src="../../../assets/images/GYm/KundenGymsite.jpg" alt="Gym Website Kunden">
       <img src="../../../assets/images/GYm/FooterGymsite.jpg" alt="Gym Website Footer">
     
      
    </section>
  </main>

  <footer>
    © 2026 Negarin Webdesign
  </footer>

</body>
</html>

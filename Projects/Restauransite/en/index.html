<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restaurant Site | Negarin Webdesign</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f7fc;
      color: #1d2340;
    }

    .container {
      width: min(92%, 1100px);
      margin: 0 auto;
    }

    header {
      padding: 28px 0;
      background: #fff;
      border-bottom: 1px solid rgba(98, 82, 181, 0.12);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

   .logo {
  display: inline-flex;
  align-items: center;
  flex-shrink: 0;
}

.logo img {
   width: 210px;
  height: auto;
  display: block;
  
}
@media (max-width: 520px) {
  .logo img {
    width: 170px;
   
  }
}


    .logo span {
      color: #6f5bff;
    }

    .back-btn {
      padding: 10px 18px;
      border-radius: 999px;
      background: #6f5bff;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    .intro {
      text-align: center;
      padding: 55px 0 35px;
    }

    .intro h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      margin: 0 0 12px;
    }

    .intro p {
      color: #697289;
      margin: 0;
      font-size: 1.05rem;
    }

   .slider-section {
    padding: 40px 0 80px;
  }
.slider {
  width: min(92vw, 780px);
  aspect-ratio: 16 / 9;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(111, 91, 255, 0.25), 0 0 0 1px rgba(111, 91, 255, 0.08) inset;
  background: linear-gradient(135deg, #e9e5ff, #dcd6ff)
}

.slider img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain; /* عکس کامل دیده میشه */
  opacity: 0;
  transform: scale(1.03);
  animation: slideShow 16s infinite;
}

.slider img:nth-child(1) { animation-delay: 0s; }
.slider img:nth-child(2) { animation-delay: 4s; }
.slider img:nth-child(3) { animation-delay: 8s; }
.slider img:nth-child(4) { animation-delay: 12s; }

@keyframes slideShow {
  0% {
    opacity: 0;
    transform: scale(1.03) translateX(25px);
  }

  8% {
    opacity: 1;
    transform: scale(1) translateX(0);
  }

  25% {
    opacity: 1;
    transform: scale(1) translateX(0);
  }

  33% {
    opacity: 0;
    transform: scale(1.03) translateX(-25px);
  }

  100% {
    opacity: 0;
  }
}

@media (max-width: 600px) {
  .slider {
    width: 94vw;
    aspect-ratio: 4 / 3; /* دیگه مربع نیست */
    border-radius: 16px;
  }

  .slider img {
    object-fit: contain; /* کامل دیده میشه */
  }
}

  


  .video-section {
    padding: 10px 0 90px;
  }

  .video-title {
    text-align: center;
    margin-bottom: 24px;
  }

  .video-title h2 {
    font-size: clamp(1.8rem, 3vw, 2.6rem);
    margin: 0 0 10px;
  }

  .video-title p {
    color: #697289;
    margin: 0;
  }

  .video-box {
    max-width: 850px;
    margin: 0 auto;
    position: relative;
    border-radius: 28px;
    padding: 10px;
    background: linear-gradient(135deg, #6f5bff, #b8a8ff, #ffffff);
    box-shadow: 0 30px 80px rgba(111, 91, 255, 0.28);
    transition: transform 0.4s ease, box-shadow 0.4s ease;
  }

  .video-box::before {
    content: "";
    position: absolute;
    inset: -18px;
    border-radius: 36px;
    background: radial-gradient(circle, rgba(111, 91, 255, 0.35), transparent 65%);
    z-index: -1;
    opacity: 0.75;
    filter: blur(18px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .video-box:hover {
    transform: translateY(-10px) scale(1.01);
    box-shadow: 0 40px 100px rgba(111, 91, 255, 0.38);
  }

  .video-box:hover::before {
    opacity: 1;
    transform: scale(1.04);
  }

  .video-box video {
    width: 100%;
    display: block;
    border-radius: 22px;
    background: #111;
  }

  @media (max-width: 520px) {
    .logo img {
      width: 170px;
    }
    




    footer {
      text-align: center;
      padding: 28px;
      color: #697289;
      background: #fff;
      border-top: 1px solid rgba(98, 82, 181, 0.12);
    }
  </style>
</head>

<body>

  <main>

</p>
        <p style="font-size: 0.8rem; color: #888; margin-top: 4px;">

        </p>
      </div>
    </section>

    

    <section class="slider-section">
     <div class="slider">
       <img src="../../../assets/images/Restaurant/Header Restaurantsite.jpg" alt="Restaurant Website header">
        <img src="../../../assets/images/Restaurant/Kontakt Resraurantsite.jpg" alt="Restaurant Website Kontakt">
        <img src="../../../assets/images/Restaurant/Menü Restaurantsite.png" alt="Restaurant Website menu">

</section>

  </main>

  <footer>

</html>

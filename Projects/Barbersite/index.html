<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barber Site | Negarin Webdesign</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f8f7fc;
      color: #1d2340;
      overflow-x: hidden;
    }

    .container {
      width: min(92%, 1100px);
      margin: 0 auto;
    }

    header {
      padding: 28px 0;
      background: #fff;
      border-bottom: 1px solid rgba(98, 82, 181, 0.12);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
    }

    .logo img {
      width: 210px;
      height: auto;
      display: block;
    }

    .back-btn {
      padding: 10px 18px;
      border-radius: 999px;
      background: #6f5bff;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    .intro {
      text-align: center;
      padding: 55px 0 35px;
    }

    .intro h1 {
      font-size: clamp(2rem, 4vw, 3.5rem);
      margin: 0 0 12px;
    }

    .intro p {
      color: #697289;
      margin: 0;
      font-size: 1.05rem;
    }

    .gallery-wrap {
      min-height: 420px;
      display: grid;
      place-items: center;
      padding: 30px 0 90px;
      perspective: 900px;
    }

    .gallery {
      display: grid;
      width: 180px;
      transform-style: preserve-3d;
      --_t: perspective(520px) rotateX(-90deg);
      animation: rotateGallery 18s ease-in-out infinite;
    }

    .gallery img {
      grid-area: 1 / 1;
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(86, 67, 163, 0.25);
      border: 1px solid rgba(98, 82, 181, 0.18);
      background: #fff;
    }

    .gallery img:nth-child(1) {
      transform: rotate(0deg) translateY(65%) rotateX(90deg);
    }

    .gallery img:nth-child(2) {
      transform: rotate(120deg) translateY(65%) rotateX(90deg);
    }

    .gallery img:nth-child(3) {
      transform: rotate(240deg) translateY(65%) rotateX(90deg);
    }

    @keyframes rotateGallery {
      0%, 5% {
        transform: var(--_t) rotate(0deg);
      }

      31%, 38% {
        transform: var(--_t) rotate(-120deg);
      }

      64%, 71% {
        transform: var(--_t) rotate(-240deg);
      }

      96%, 100% {
        transform: var(--_t) rotate(-360deg);
      }
    }

    footer {
      text-align: center;
      padding: 28px;
      color: #697289;
      background: #fff;
      border-top: 1px solid rgba(98, 82, 181, 0.12);
    }

    @media (max-width: 520px) {
      .logo img {
        width: 170px;
      }

      .gallery-wrap {
        min-height: 340px;
      }

      .gallery {
        width: 220px;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="container top">
      <a class="logo" href="/" aria-label="Negarin Webdesign Startseite">
        <img src="../../assets/images/negarin-logo-transparent.png" alt="Negarin Webdesign Logo">
      </a>

      <a href="/" class="back-btn">Zurück zum Portfolio</a>
    </div>
  </header>

  <main>
    <section class="intro">
      <div class="container">
        <h1>Barber Website</h1>
        <p>Ein modernes Webdesign-Konzept für einen lokalen Barbershop.</p>
        <p style="font-size: 0.8rem; color: #888; margin-top: 4px;">
          Konzeptdesign für ein lokales Unternehmen – Portfolio-Projekt.
        </p>
      </div>
    </section>

    <section class="gallery-wrap">
      <div class="gallery">
        <img src="../../assets/images/Barbersite/Header Barbersite.jpg" alt="Barbershop Website Startseite">
        <img src="../../assets/images/Barbersite/Kontact Barbersite.jpg" alt="Barbershop Website Kontakt">
        <img src="../../assets/images/Barbersite/Footer Barbersite.jpg" alt="Barbershop Website Footer">
      </div>
    </section>
  </main>

  <footer>
    © 2026 Negarin Webdesign
  </footer>

</body>
</html>
